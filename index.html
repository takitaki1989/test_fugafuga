<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TODOアプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 24px;
      color: #333;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4a90e2;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #357abd;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    li:last-child {
      border-bottom: none;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4a90e2;
    }

    li .text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      transition: color 0.2s;
    }

    li.done .text {
      text-decoration: line-through;
      color: #aaa;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    li .delete-btn:hover {
      color: #e05555;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 24px 0;
      font-size: 0.95rem;
    }

    .storage-warn {
      display: none;
      margin-top: 20px;
      padding: 12px 16px;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 8px;
      color: #7a6000;
      font-size: 0.88rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TODO</h1>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="やることを入力..." />
      <button onclick="addTodo()">追加</button>
    </div>
    <ul id="todoList"></ul>
    <p class="empty" id="emptyMsg">タスクはありません</p>
    <p class="storage-warn" id="storageWarn">
      ⚠️ このブラウザではローカルストレージが使用できないため、データは保存されません。<br>
      Chrome または Firefox でファイルを開いてください。
    </p>
  </div>

  <script>
    const input = document.getElementById('todoInput');
    const list  = document.getElementById('todoList');
    const emptyMsg = document.getElementById('emptyMsg');
    const storageWarn = document.getElementById('storageWarn');

    // localStorage が file:// で使えるか確認
    let storageAvailable = false;
    try {
      localStorage.setItem('__test__', '1');
      localStorage.removeItem('__test__');
      storageAvailable = true;
    } catch (e) {
      storageWarn.style.display = 'block';
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTodo();
    });

    function saveTodos() {
      if (!storageAvailable) return;
      const todos = Array.from(list.querySelectorAll('li')).map(function(li) {
        return {
          text: li.querySelector('.text').textContent,
          done: li.classList.contains('done')
        };
      });
      try {
        localStorage.setItem('todos', JSON.stringify(todos));
      } catch (e) {
        storageAvailable = false;
        storageWarn.style.display = 'block';
      }
    }

    function createItem(text, done) {
      const li = document.createElement('li');
      if (done) li.classList.add('done');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = done;
      checkbox.addEventListener('change', function() {
        li.classList.toggle('done', checkbox.checked);
        saveTodos();
      });

      const span = document.createElement('span');
      span.className = 'text';
      span.textContent = text;

      const btn = document.createElement('button');
      btn.className = 'delete-btn';
      btn.textContent = '✕';
      btn.addEventListener('click', function() {
        li.remove();
        updateEmpty();
        saveTodos();
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(btn);
      return li;
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;

      list.appendChild(createItem(text, false));
      input.value = '';
      updateEmpty();
      saveTodos();
    }

    function updateEmpty() {
      emptyMsg.style.display = list.children.length === 0 ? 'block' : 'none';
    }

    // ページ読み込み時にローカルストレージから復元
    const saved = storageAvailable ? JSON.parse(localStorage.getItem('todos') || '[]') : [];
    saved.forEach(function(todo) {
      list.appendChild(createItem(todo.text, todo.done));
    });
    updateEmpty();
  </script>
</body>
</html>
