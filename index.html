<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TODOアプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 24px;
      color: #333;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4a90e2;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #357abd;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    li:last-child {
      border-bottom: none;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4a90e2;
    }

    li .text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      transition: color 0.2s;
    }

    li.done .text {
      text-decoration: line-through;
      color: #aaa;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    li .delete-btn:hover {
      color: #e05555;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 24px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TODO</h1>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="やることを入力..." />
      <button onclick="addTodo()">追加</button>
    </div>
    <ul id="todoList"></ul>
    <p class="empty" id="emptyMsg">タスクはありません</p>
  </div>

  <script>
    const input = document.getElementById('todoInput');
    const list  = document.getElementById('todoList');
    const emptyMsg = document.getElementById('emptyMsg');

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTodo();
    });

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;

      const li = document.createElement('li');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.addEventListener('change', function() {
        li.classList.toggle('done', checkbox.checked);
      });

      const span = document.createElement('span');
      span.className = 'text';
      span.textContent = text;

      const btn = document.createElement('button');
      btn.className = 'delete-btn';
      btn.textContent = '✕';
      btn.addEventListener('click', function() {
        li.remove();
        updateEmpty();
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(btn);
      list.appendChild(li);

      input.value = '';
      updateEmpty();
    }

    function updateEmpty() {
      emptyMsg.style.display = list.children.length === 0 ? 'block' : 'none';
    }

    updateEmpty();
  </script>
</body>
</html>
